<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Arc Predict</title>
  <script src="https://cdn.jsdelivr.net/npm/ethers@6.11.1/dist/ethers.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #1a0a2e; --surface: #2d1b4e; --surface2: #3d2460;
      --accent: #7c3aed; --accent2: #a855f7; --yes: #22c55e; --no: #ef4444;
      --text: #e2d9f3; --muted: #9d8ec4; --border: #4c2a7a; --glow: rgba(124,58,237,0.4);
    }
    body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; background-image: radial-gradient(ellipse at 20% 10%, rgba(124,58,237,0.15) 0%, transparent 50%), radial-gradient(ellipse at 80% 80%, rgba(168,85,247,0.1) 0%, transparent 50%); }
    header { display: flex; align-items: center; justify-content: space-between; padding: 1.25rem 2rem; border-bottom: 1px solid var(--border); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 10; background: rgba(26,10,46,0.85); }
    .logo { display: flex; align-items: center; gap: 0.6rem; font-size: 1.4rem; font-weight: 700; letter-spacing: -0.5px; }
    .logo-icon { width: 36px; height: 36px; background: linear-gradient(135deg, var(--accent), var(--accent2)); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; box-shadow: 0 0 20px var(--glow); }
    .logo span { color: var(--accent2); }
    #connectBtn { background: linear-gradient(135deg, var(--accent), var(--accent2)); border: none; color: #fff; padding: 0.55rem 1.3rem; border-radius: 10px; font-weight: 600; cursor: pointer; font-size: 0.9rem; transition: opacity 0.2s, transform 0.1s; box-shadow: 0 0 16px var(--glow); }
    #connectBtn:hover { opacity: 0.85; transform: translateY(-1px); }
    .wallet-info { display: flex; align-items: center; gap: 0.75rem; }
    .wallet-addr { background: var(--surface); border: 1px solid var(--border); padding: 0.45rem 0.9rem; border-radius: 8px; font-size: 0.82rem; color: var(--muted); font-family: monospace; }
    .network-badge { background: rgba(34,197,94,0.15); border: 1px solid rgba(34,197,94,0.3); color: #22c55e; padding: 0.3rem 0.7rem; border-radius: 6px; font-size: 0.75rem; font-weight: 600; }
    .lang-toggle { background: var(--surface); border: 1px solid var(--border); color: var(--muted); padding: 0.3rem 0.7rem; border-radius: 6px; font-size: 0.78rem; font-weight: 700; cursor: pointer; transition: border-color 0.15s, color 0.15s; }
    .lang-toggle:hover { border-color: var(--accent); color: var(--text); }
    main { max-width: 900px; margin: 0 auto; padding: 2rem 1.5rem; }
    .hero { text-align: center; margin-bottom: 2.5rem; }
    .hero h1 { font-size: 2.4rem; font-weight: 800; background: linear-gradient(135deg, #e2d9f3, var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 0.6rem; }
    .hero p { color: var(--muted); font-size: 1.05rem; }
    .stats-bar { display: grid; grid-template-columns: repeat(3,1fr); gap: 1rem; margin-bottom: 2rem; }
    .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1rem 1.25rem; text-align: center; }
    .stat-card .value { font-size: 1.6rem; font-weight: 700; color: var(--accent2); }
    .stat-card .label { font-size: 0.8rem; color: var(--muted); margin-top: 0.2rem; }
    .section-title { font-size: 1.1rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 1rem; }
    #predictions { display: flex; flex-direction: column; gap: 1rem; }
    .pred-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 1.5rem; transition: border-color 0.2s, box-shadow 0.2s; }
    .pred-card:hover { border-color: var(--accent); box-shadow: 0 0 24px rgba(124,58,237,0.2); }
    .pred-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1rem; gap: 1rem; }
    .pred-question { font-size: 1.05rem; font-weight: 600; flex: 1; line-height: 1.4; }
    .pred-badge { padding: 0.3rem 0.7rem; border-radius: 6px; font-size: 0.75rem; font-weight: 700; white-space: nowrap; flex-shrink: 0; }
    .badge-active { background: rgba(124,58,237,0.2); border: 1px solid var(--accent); color: var(--accent2); }
    .badge-resolved-yes { background: rgba(34,197,94,0.15); border: 1px solid rgba(34,197,94,0.4); color: #22c55e; }
    .badge-resolved-no { background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.4); color: #ef4444; }
    .badge-closed { background: rgba(157,142,196,0.15); border: 1px solid rgba(157,142,196,0.3); color: var(--muted); }
    .pred-meta { display: flex; gap: 1.5rem; font-size: 0.82rem; color: var(--muted); margin-bottom: 1rem; }
    .progress-container { margin-bottom: 1.25rem; }
    .progress-labels { display: flex; justify-content: space-between; font-size: 0.82rem; margin-bottom: 0.4rem; }
    .label-yes { color: var(--yes); font-weight: 600; }
    .label-no { color: var(--no); font-weight: 600; }
    .progress-bar { height: 8px; border-radius: 4px; background: var(--surface2); overflow: hidden; }
    .progress-fill { height: 100%; border-radius: 4px; background: linear-gradient(90deg, var(--yes), #86efac); transition: width 0.5s ease; }
    .bet-row { display: flex; gap: 0.75rem; align-items: center; }
    .bet-input { flex: 1; background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 0.55rem 0.9rem; border-radius: 8px; font-size: 0.9rem; outline: none; transition: border-color 0.2s; }
    .bet-input:focus { border-color: var(--accent); }
    .bet-input::placeholder { color: var(--muted); }
    .btn-yes, .btn-no, .btn-claim { border: none; padding: 0.55rem 1.1rem; border-radius: 8px; font-weight: 700; cursor: pointer; font-size: 0.88rem; transition: opacity 0.2s, transform 0.1s; white-space: nowrap; }
    .btn-yes { background: linear-gradient(135deg, #16a34a, #22c55e); color: #fff; }
    .btn-no { background: linear-gradient(135deg, #dc2626, #ef4444); color: #fff; }
    .btn-claim { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; width: 100%; padding: 0.7rem; }
    .btn-yes:hover, .btn-no:hover, .btn-claim:hover { opacity: 0.85; transform: translateY(-1px); }
    .toast-container { position: fixed; bottom: 1.5rem; right: 1.5rem; display: flex; flex-direction: column; gap: 0.6rem; z-index: 100; }
    .toast { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 0.8rem 1.2rem; font-size: 0.88rem; max-width: 320px; animation: slideIn 0.3s ease; box-shadow: 0 4px 20px rgba(0,0,0,0.4); }
    .toast.success { border-color: rgba(34,197,94,0.5); }
    .toast.error { border-color: rgba(239,68,68,0.5); color: #fca5a5; }
    @keyframes slideIn { from { transform: translateX(120%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    .empty-state { text-align: center; padding: 3rem; color: var(--muted); }
    .spinner { display: inline-block; width: 1rem; height: 1rem; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; margin-right: 0.4rem; vertical-align: middle; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .your-bet-info { font-size: 0.8rem; color: var(--muted); margin-top: 0.4rem; }
    .price-badge { display: inline-flex; align-items: center; gap: 0.3rem; background: rgba(251,191,36,0.1); border: 1px solid rgba(251,191,36,0.3); color: #fbbf24; padding: 0.25rem 0.6rem; border-radius: 6px; font-size: 0.75rem; font-weight: 600; }
    .filter-bar { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1.25rem; }
    .filter-btn { background: var(--surface); border: 1px solid var(--border); color: var(--muted); padding: 0.4rem 1rem; border-radius: 20px; font-size: 0.82rem; font-weight: 600; cursor: pointer; transition: border-color 0.15s, color 0.15s, background 0.15s, box-shadow 0.15s; white-space: nowrap; }
    .filter-btn:hover { border-color: var(--accent); color: var(--text); }
    .filter-btn.active { background: linear-gradient(135deg, var(--accent), var(--accent2)); border-color: transparent; color: #fff; box-shadow: 0 0 12px var(--glow); }
    .filter-count { opacity: 0.75; font-size: 0.75rem; margin-left: 0.2rem; }
    /* ── Tab navigation ── */
    .tab-bar { display: flex; border-bottom: 1px solid var(--border); margin-bottom: 2rem; gap: 0; }
    .tab-btn { background: none; border: none; border-bottom: 2px solid transparent; color: var(--muted); padding: 0.75rem 1.5rem; font-size: 0.95rem; font-weight: 700; cursor: pointer; transition: color 0.15s, border-color 0.15s; letter-spacing: 0.3px; }
    .tab-btn:hover { color: var(--text); }
    .tab-btn.active { color: var(--accent2); border-bottom-color: var(--accent2); }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }
    /* ── Match cards ── */
    .match-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 1.5rem; margin-bottom: 1rem; transition: border-color 0.2s, box-shadow 0.2s; }
    .match-card:hover { border-color: var(--accent); box-shadow: 0 0 24px rgba(124,58,237,0.2); }
    .match-teams { display: flex; align-items: center; justify-content: space-between; gap: 1rem; margin-bottom: 0.75rem; }
    .team-name { font-size: 1.1rem; font-weight: 700; flex: 1; }
    .team-home { text-align: left; }
    .team-away { text-align: right; }
    .match-vs { font-size: 0.85rem; font-weight: 700; color: var(--muted); padding: 0 0.5rem; flex-shrink: 0; }
    .match-meta { display: flex; gap: 1.5rem; font-size: 0.82rem; color: var(--muted); margin-bottom: 1.25rem; }
    .match-badge { padding: 0.25rem 0.65rem; border-radius: 6px; font-size: 0.75rem; font-weight: 700; white-space: nowrap; }
    .badge-upcoming { background: rgba(124,58,237,0.2); border: 1px solid var(--accent); color: var(--accent2); }
    .badge-live { background: rgba(239,68,68,0.2); border: 1px solid rgba(239,68,68,0.5); color: #ef4444; animation: pulse 1.5s infinite; }
    .badge-finished { background: rgba(157,142,196,0.15); border: 1px solid rgba(157,142,196,0.3); color: var(--muted); }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
    .odds-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0.75rem; margin-bottom: 1rem; }
    .odds-btn { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 0.7rem 0.5rem; cursor: pointer; text-align: center; transition: border-color 0.15s, background 0.15s, transform 0.1s; }
    .odds-btn:hover:not(:disabled) { border-color: var(--accent); background: rgba(124,58,237,0.15); transform: translateY(-1px); }
    .odds-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .odds-label { font-size: 0.72rem; color: var(--muted); font-weight: 600; margin-bottom: 0.3rem; }
    .odds-value { font-size: 1.15rem; font-weight: 800; color: var(--accent2); }
    .odds-pool { font-size: 0.7rem; color: var(--muted); margin-top: 0.15rem; }
    .match-bet-row { display: flex; gap: 0.75rem; align-items: center; }
    .match-result { text-align: center; padding: 0.75rem; border-radius: 10px; font-weight: 700; margin-bottom: 0.75rem; }
    .match-result.home { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3); color: #22c55e; }
    .match-result.draw { background: rgba(251,191,36,0.1); border: 1px solid rgba(251,191,36,0.3); color: #fbbf24; }
    .match-result.away { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #ef4444; }
    .odds-btn.disabled-look, .disabled-look { opacity: 0.55; cursor: not-allowed; }
    /* ── Leaderboard ── */
    .lb-table { width: 100%; border-collapse: collapse; }
    .lb-table th { text-align: left; font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; padding: 0.6rem 0.75rem; border-bottom: 1px solid var(--border); }
    .lb-table td { padding: 0.75rem; border-bottom: 1px solid rgba(76,42,122,0.3); font-size: 0.88rem; }
    .lb-table tr:hover td { background: rgba(124,58,237,0.05); }
    .lb-rank { font-weight: 800; color: var(--muted); font-size: 0.85rem; }
    .lb-rank.top1 { color: #fbbf24; }
    .lb-rank.top2 { color: #9ca3af; }
    .lb-rank.top3 { color: #cd7c2f; }
    .lb-addr { font-family: monospace; font-size: 0.82rem; color: var(--accent2); }
    .lb-winnings { font-weight: 700; color: var(--yes); }
    .lb-accuracy { display: inline-block; padding: 0.2rem 0.5rem; border-radius: 4px; font-size: 0.78rem; font-weight: 700; }
    .lb-accuracy.high { background: rgba(34,197,94,0.15); color: #22c55e; }
    .lb-accuracy.mid { background: rgba(251,191,36,0.15); color: #fbbf24; }
    .lb-accuracy.low { background: rgba(239,68,68,0.15); color: #ef4444; }
    /* ── Profile / History ── */
    .profile-header { display: grid; grid-template-columns: repeat(4,1fr); gap: 1rem; margin-bottom: 2rem; }
    .profile-stat { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1rem; text-align: center; }
    .profile-stat .val { font-size: 1.5rem; font-weight: 800; color: var(--accent2); }
    .profile-stat .lbl { font-size: 0.78rem; color: var(--muted); margin-top: 0.25rem; }
    .history-item { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: 0.75rem; display: grid; grid-template-columns: 1fr auto; gap: 0.75rem; align-items: center; }
    .history-q { font-size: 0.9rem; font-weight: 600; line-height: 1.4; margin-bottom: 0.3rem; }
    .history-meta { font-size: 0.78rem; color: var(--muted); }
    .history-result { text-align: right; }
    .result-win { color: var(--yes); font-weight: 700; }
    .result-loss { color: var(--no); font-weight: 700; }
    .result-pending { color: var(--muted); font-weight: 700; }
    /* ── Share button ── */
    .btn-share { background: none; border: 1px solid var(--border); color: var(--muted); padding: 0.4rem 0.8rem; border-radius: 8px; font-size: 0.78rem; cursor: pointer; transition: border-color 0.15s, color 0.15s; margin-top: 0.5rem; }
    .btn-share:hover { border-color: var(--accent); color: var(--text); }
    .share-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 200; }
    .share-box { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 1.5rem; max-width: 420px; width: 90%; }
    .share-box h3 { font-size: 1rem; font-weight: 700; margin-bottom: 1rem; }
    .share-text-preview { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 0.75rem; font-size: 0.82rem; color: var(--text); line-height: 1.5; margin-bottom: 1rem; white-space: pre-wrap; }
    .share-btns { display: flex; gap: 0.75rem; flex-wrap: wrap; }
    .btn-twitter { background: #1da1f2; border: none; color: #fff; padding: 0.55rem 1.1rem; border-radius: 8px; font-weight: 700; cursor: pointer; font-size: 0.88rem; }
    .btn-farcaster { background: #8a63d2; border: none; color: #fff; padding: 0.55rem 1.1rem; border-radius: 8px; font-weight: 700; cursor: pointer; font-size: 0.88rem; }
    .btn-close-share { background: var(--surface2); border: 1px solid var(--border); color: var(--muted); padding: 0.55rem 1rem; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 0.88rem; margin-left: auto; }
    @media (max-width: 600px) { .stats-bar { grid-template-columns: 1fr 1fr; } .bet-row { flex-wrap: wrap; } .bet-input { min-width: 0; } header { padding: 1rem; } .filter-bar { gap: 0.4rem; } .filter-btn { padding: 0.35rem 0.75rem; font-size: 0.78rem; } .tab-btn { padding: 0.65rem 1rem; font-size: 0.85rem; } .odds-value { font-size: 1rem; } .profile-header { grid-template-columns: 1fr 1fr; } }
  </style>
</head>
<body>
<header>
  <div class="logo">
    <div class="logo-icon">🔮</div>
    Arc <span>Predict</span>
  </div>
  <div class="wallet-info">
    <button id="langToggle" class="lang-toggle" onclick="toggleLang()">EN</button>
    <span id="networkBadge" class="network-badge" style="display:none">Arc Testnet</span>
    <span id="walletAddr" class="wallet-addr" style="display:none"></span>
    <button id="connectBtn" data-i18n="connectBtn"></button>
  </div>
</header>
<main>
  <div class="hero">
    <h1 data-i18n="heroTitle"></h1>
    <p data-i18n="heroSub"></p>
  </div>
  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('tahminler')" data-i18n="tabPredictions"></button>
    <button class="tab-btn" onclick="switchTab('maclar')" data-i18n="tabMatches"></button>
    <button class="tab-btn" onclick="switchTab('liderlik')" data-i18n="tabLeaderboard"></button>
    <button class="tab-btn" onclick="switchTab('profil')" data-i18n="tabProfile"></button>
  </div>

  <!-- TAB: PREDICTIONS -->
  <div id="tab-tahminler" class="tab-panel active">
    <div class="stats-bar">
      <div class="stat-card"><div class="value" id="statTotal">—</div><div class="label" data-i18n="statTotalLabel"></div></div>
      <div class="stat-card"><div class="value" id="statActive">—</div><div class="label" data-i18n="statActiveLabel"></div></div>
      <div class="stat-card"><div class="value" id="statPool">—</div><div class="label" data-i18n="statPoolLabel"></div></div>
    </div>
    <div class="section-title" data-i18n="sectionPredictions"></div>
    <div class="filter-bar" id="filterBar">
      <button class="filter-btn active" data-cat="tumu" onclick="setFilter('tumu')" data-i18n="filterAll"></button>
      <button class="filter-btn" data-cat="siyaset" onclick="setFilter('siyaset')" data-i18n="filterPolitics"></button>
      <button class="filter-btn" data-cat="ekonomi" onclick="setFilter('ekonomi')" data-i18n="filterEconomy"></button>
      <button class="filter-btn" data-cat="magazin" onclick="setFilter('magazin')" data-i18n="filterEntertainment"></button>
      <button class="filter-btn" data-cat="spor" onclick="setFilter('spor')" data-i18n="filterSports"></button>
      <button class="filter-btn" data-cat="kripto" onclick="setFilter('kripto')" data-i18n="filterCrypto"></button>
    </div>
    <div id="predictions">
      <div class="empty-state" data-i18n="emptyConnectPred"></div>
    </div>
  </div>

  <!-- TAB: MATCHES -->
  <div id="tab-maclar" class="tab-panel">
    <div class="stats-bar">
      <div class="stat-card"><div class="value" id="statMatches">—</div><div class="label" data-i18n="statMatchesLabel"></div></div>
      <div class="stat-card"><div class="value" id="statMatchPool">—</div><div class="label" data-i18n="statMatchPoolLabel"></div></div>
      <div class="stat-card"><div class="value" id="statMatchOpen">—</div><div class="label" data-i18n="statMatchOpenLabel"></div></div>
    </div>
    <div class="section-title" data-i18n="sectionWC"></div>
    <div id="matches">
      <div class="empty-state" data-i18n="emptyConnectMatch"></div>
    </div>
  </div>

  <!-- TAB: LEADERBOARD -->
  <div id="tab-liderlik" class="tab-panel">
    <div class="stats-bar" style="margin-bottom:1.5rem">
      <div class="stat-card"><div class="value" id="lbStatPlayers">—</div><div class="label" data-i18n="lbStatPlayersLabel"></div></div>
      <div class="stat-card"><div class="value" id="lbStatTopWin">—</div><div class="label" data-i18n="lbStatTopWinLabel"></div></div>
      <div class="stat-card"><div class="value" id="lbStatAvgAcc">—</div><div class="label" data-i18n="lbStatAvgAccLabel"></div></div>
    </div>
    <div class="section-title" data-i18n="sectionTopWinners"></div>
    <div id="leaderboardContainer">
      <div class="empty-state" data-i18n="emptyLeaderboard"></div>
    </div>
  </div>

  <!-- TAB: PROFILE -->
  <div id="tab-profil" class="tab-panel">
    <div id="profileNotConnected" class="empty-state" data-i18n="profileNotConnected"></div>
    <div id="profileContent" style="display:none">
      <div class="profile-header">
        <div class="profile-stat"><div class="val" id="profTotalBets">—</div><div class="lbl" data-i18n="profTotalBetsLabel"></div></div>
        <div class="profile-stat"><div class="val" id="profWins">—</div><div class="lbl" data-i18n="profWinsLabel"></div></div>
        <div class="profile-stat"><div class="val" id="profAccuracy">—</div><div class="lbl" data-i18n="profAccuracyLabel"></div></div>
        <div class="profile-stat"><div class="val" id="profNetPnl">—</div><div class="lbl" data-i18n="profNetPnlLabel"></div></div>
      </div>
      <div class="section-title" data-i18n="sectionBetHistory"></div>
      <div id="historyContainer"></div>
    </div>
  </div>
</main>
<div id="shareModal" class="share-modal" style="display:none" onclick="if(event.target===this)closeShare()">
  <div class="share-box">
    <h3 data-i18n="shareTitle"></h3>
    <div class="share-text-preview" id="shareTextPreview"></div>
    <div class="share-btns">
      <button class="btn-twitter" onclick="shareTwitter()">𝕏 Twitter</button>
      <button class="btn-farcaster" onclick="shareFarcaster()">🟣 Farcaster</button>
      <button class="btn-close-share" onclick="closeShare()" data-i18n="shareClose"></button>
    </div>
  </div>
</div>
<div class="toast-container" id="toastContainer"></div>
<script>
  // ── i18n ────────────────────────────────────────────────────────────────────

  const DEPLOY_BLOCK = 46186575;
  const LOG_CHUNK = 10000;
  const LOG_PARALLEL = 5;

  async function scanBlocksParallel(ct, filter, fromBlock, toBlock) {
    const chunks = [];
    for (let b = fromBlock; b <= toBlock; b += LOG_CHUNK) {
      chunks.push([b, Math.min(b + LOG_CHUNK - 1, toBlock)]);
    }
    if (!chunks.length) return [];
    const events = [];
    for (let i = 0; i < chunks.length; i += LOG_PARALLEL) {
      const group = chunks.slice(i, i + LOG_PARALLEL);
      const results = await Promise.all(group.map(([f, t2]) =>
        ct.queryFilter(filter, f, t2).catch(() => [])
      ));
      results.forEach(r => events.push(...r));
    }
    return events;
  }

  function betCacheKey(ctAddr) {
    return `arc_bets_${ctAddr.toLowerCase()}_${(userAddress || '').toLowerCase()}`;
  }

  async function getProfileBetIds(ct, filter, ctAddr, latest) {
    const key = betCacheKey(ctAddr);
    let cache = null;
    try { cache = JSON.parse(localStorage.getItem(key) || 'null'); } catch {}
    const fromBlock = (cache && cache.lastBlock >= DEPLOY_BLOCK) ? cache.lastBlock + 1 : DEPLOY_BLOCK;
    const cachedIds = cache?.ids || [];
    let allIds = [...cachedIds];
    if (fromBlock <= latest) {
      const newEvents = await scanBlocksParallel(ct, filter, fromBlock, latest);
      const newIds = newEvents.map(e => Number(e.args[0]));
      allIds = [...new Set([...cachedIds, ...newIds])];
      try { localStorage.setItem(key, JSON.stringify({ lastBlock: latest, ids: allIds })); } catch {}
    }
    return allIds;
  }

  function timeLeft(deadline) {
    const now=Math.floor(Date.now()/1000), diff=Number(deadline)-now;
    if (diff<=0) return t('expired');
    const d=Math.floor(diff/86400), h=Math.floor((diff%86400)/3600), m=Math.floor((diff%3600)/60);
    if (d>0) return `${d}${t('unitDay')} ${h}${t('unitHour')} ${t('unitLeft')}`;
    if (h>0) return `${h}${t('unitHour')} ${m}${t('unitMin')} ${t('unitLeft')}`;
    return `${m}${t('unitMin')} ${t('unitLeft')}`;
  }

  async function loadPredictions() {
    const container=document.getElementById("predictions");
    container.innerHTML=`<div class="empty-state"><span class="spinner"></span> ${t('loading')}</div>`;
    try {
      const count=Number(await contract.predictionCount());
      document.getElementById("statTotal").textContent=count;
      if(count===0){container.innerHTML=`<div class="empty-state">${t('noPredictions')}</div>`;document.getElementById("statActive").textContent="0";document.getElementById("statPool").textContent="0 USDC";return;}
      const PRED_BATCH=10;
      const items=[];
      const updateStats=()=>{const now=Math.floor(Date.now()/1000);const active=items.filter(p=>!p.resolved&&Number(p.deadline)>now);const totalPool=items.reduce((acc,p)=>acc+Number(BigInt(p.totalYes)+BigInt(p.totalNo)),0);document.getElementById("statActive").textContent=active.length;document.getElementById("statPool").textContent=(totalPool/1e18).toFixed(2)+" USDC";};
      await Promise.all(Array.from({length:Math.ceil(count/PRED_BATCH)},(_,bi)=>{
        const s=bi*PRED_BATCH,e=Math.min(s+PRED_BATCH,count);
        return Promise.all(Array.from({length:e-s},(__,j)=>{
          const i=s+j;
          return Promise.all([contract.getPrediction(i),contract.getUserBets(i,userAddress)])
            .then(([p,userBets])=>({id:i,...parseP(p),userBets}));
        })).then(batch=>{items.push(...batch);updateStats();});
      }));
      allPredictions=items.slice().reverse();
      updateFilterCounts();
      renderFiltered();
    } catch(err){container.innerHTML=`<div class="empty-state">${t('loadError')}</div>`;console.error(err);}
  }

  function parseP([question,deadline,resolved,result,totalYes,totalNo]){return{question,deadline,resolved,result,totalYes,totalNo};}

  function buildCard(p) {
    const now=Math.floor(Date.now()/1000),isOpen=!p.resolved&&Number(p.deadline)>now;
    const yesN=Number(BigInt(p.totalYes)),noN=Number(BigInt(p.totalNo)),total=yesN+noN;
    const yesPct=total>0?Math.round((yesN/total)*100):50;
    const [userYes,userNo,userClaimed]=p.userBets;
    const hasWon=p.resolved&&((p.result&&Number(BigInt(userYes))>0)||(!p.result&&Number(BigInt(userNo))>0));
    let badgeClass="badge-active", badgeText=t('badgeOpen');
    if(p.resolved){badgeClass=p.result?"badge-resolved-yes":"badge-resolved-no";badgeText=p.result?t('badgeResultYes'):t('badgeResultNo');}
    else if(!isOpen){badgeClass="badge-closed";badgeText=t('badgeClosed');}
    const coin=detectCoinFromQuestion(p.question);
    const price=coin&&cryptoPrices[coin];
    const priceBadge=price?`<span class="price-badge">◈ ${t('livePrice')} $${Number(price).toLocaleString('en-US')}</span>`:'';
    const card=document.createElement("div");
    card.className="pred-card";
    card.innerHTML=`
      <div class="pred-header"><div class="pred-question">${escHtml(p.question)}</div><span class="pred-badge ${badgeClass}">${badgeText}</span></div>
      <div class="pred-meta"><span>⏱ ${timeLeft(p.deadline)}</span><span>💰 ${(total/1e18).toFixed(4)} ${t('pool')}</span><span>#${p.id}</span>${priceBadge}</div>
      <div class="progress-container">
        <div class="progress-labels"><span class="label-yes">${t('betYesLabel')} ${yesPct}% (${(yesN/1e18).toFixed(4)})</span><span class="label-no">${100-yesPct}% ${t('betNoLabel')} (${(noN/1e18).toFixed(4)})</span></div>
        <div class="progress-bar"><div class="progress-fill" style="width:${yesPct}%"></div></div>
      </div>
      ${isOpen?`<div class="bet-row"><input class="bet-input" id="amt-${p.id}" type="number" min="0.0001" step="0.0001" placeholder="${t('amountPlaceholder')}" /><button class="btn-yes" onclick="placeBet(${p.id},true)">${t('betYes')}</button><button class="btn-no" onclick="placeBet(${p.id},false)">${t('betNo')}</button></div>${Number(BigInt(userYes))>0?`<div class="your-bet-info">${t('yourYesBet')} ${(Number(BigInt(userYes))/1e18).toFixed(4)} USDC</div>`:""}${Number(BigInt(userNo))>0?`<div class="your-bet-info">${t('yourNoBet')} ${(Number(BigInt(userNo))/1e18).toFixed(4)} USDC</div>`:""}`:""}
      ${hasWon&&!userClaimed?`<button class="btn-claim" onclick="claimWinnings(${p.id})">${t('claimWin')}</button>`:""}
      ${hasWon&&userClaimed?`<div class="your-bet-info" style="color:var(--yes);margin-top:0.5rem;">${t('claimDone')}</div>`:""}
      <button class="btn-share" onclick="openSharePred(${p.id},${yesPct})">${t('share')}</button>
    `;
    return card;
  }

  function escHtml(str){return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}

  async function placeBet(predictionId,isYes) {
    if(!contract){toast(t('connectFirst'),"error");return;}
    const input=document.getElementById(`amt-${predictionId}`);
    const amount=parseFloat(input.value);
    if(!amount||amount<=0){toast(t('validAmount'),"error");return;}
    try {
      toast(t('sendingTx'));
      const tx=await contract.placeBet(predictionId,isYes,{value:parseEther(amount.toString())});
      toast(t('waitingConfirm'));
      await tx.wait();
      toast(`${t('betPlacedPred')} ${amount} USDC ${isYes?t('betYesLabel'):t('betNoLabel')}`,"success");
      input.value="";
      await loadPredictions();
    } catch(err){toast(t('txError')+" "+(err?.reason||err?.message||t('unknown')),"error");}
  }

  async function claimWinnings(predictionId) {
    if(!contract){toast(t('connectFirst'),"error");return;}
    try {
      toast(t('claiming'));
      const tx=await contract.claimWinnings(predictionId);
      await tx.wait();
      toast(t('claimSuccess'),"success");
      await loadPredictions();
    } catch(err){toast(t('error')+" "+(err?.reason||err?.message||t('unknown')),"error");}
  }

  // ── MATCHES ──────────────────────────────────────────────────────────────────
  function calcOdds(myPool, totalPool) {
    if (!myPool || myPool === 0n) return '—';
    const gross = (totalPool * 98n) / (100n * myPool);
    const int = Number(gross), dec = Number((totalPool * 98n * 100n / (100n * myPool)) % 100n);
    return int.toFixed(0) + '.' + String(dec).padStart(2,'0');
  }

  function matchTimeLabel(kickoff) {
    const now = Math.floor(Date.now()/1000), diff = kickoff - now;
    if (diff > 0) {
      const d = Math.floor(diff/86400), h = Math.floor((diff%86400)/3600), m = Math.floor((diff%3600)/60);
      if (d > 0) return `${d}${t('unitDay')} ${h}${t('unitHour')} ${t('unitLeft')}`;
      if (h > 0) return `${h}${t('unitHour')} ${m}${t('unitMin')} ${t('unitLeft')}`;
      return `${m}${t('unitMin')} ${t('unitLeft')}`;
    }
    return t('expired');
  }

  async function loadMatches() {
    const container = document.getElementById('matches');
    container.innerHTML = `<div class="empty-state"><span class="spinner"></span> ${t('loading')}</div>`;
    try {
      const count = Number(await wcContract.matchCount());
      document.getElementById('statMatches').textContent = count;
      if (count === 0) { container.innerHTML = `<div class="empty-state">${t('noMatches')}</div>`; return; }

      const items = await Promise.all(Array.from({length:count},(_,i) =>
        wcContract.getMatch(i).then(async m => {
          const ub = await wcContract.getUserBet(i, userAddress);
          return { id:i, homeTeam:m[0], awayTeam:m[1], kickoff:Number(m[2]), resolved:m[3], result:Number(m[4]), poolHome:m[5], poolDraw:m[6], poolAway:m[7], userHome:ub[0], userDraw:ub[1], userAway:ub[2], claimed:ub[3] };
        })
      ));

      const now = Math.floor(Date.now()/1000);
      const openCount = items.filter(m => !m.resolved && m.kickoff > now).length;
      const totalPool = items.reduce((a,m) => a + Number(m.poolHome + m.poolDraw + m.poolAway), 0);
      document.getElementById('statMatchOpen').textContent = openCount;
      document.getElementById('statMatchPool').textContent = (totalPool/1e18).toFixed(2) + ' USDC';

      allMatches = items;
      container.innerHTML = '';
      items.forEach(m => container.appendChild(buildMatchCard(m)));
    } catch(err) { container.innerHTML = `<div class="empty-state">${t('loadError')}</div>`; console.error(err); }
  }

  function buildMatchCard(m) {
    const now = Math.floor(Date.now()/1000);
    const isOpen = !m.resolved && m.kickoff > now;
    const totalPool = m.poolHome + m.poolDraw + m.poolAway;

    const oddsHome = calcOdds(m.poolHome, totalPool);
    const oddsDraw = calcOdds(m.poolDraw, totalPool);
    const oddsAway = calcOdds(m.poolAway, totalPool);

    const poolHomeFmt = (Number(m.poolHome)/1e18).toFixed(3);
    const poolDrawFmt = (Number(m.poolDraw)/1e18).toFixed(3);
    const poolAwayFmt = (Number(m.poolAway)/1e18).toFixed(3);

    const kickoffDate = new Date(m.kickoff*1000);
    const locale = lang === 'tr' ? 'tr-TR' : 'en-GB';
    const kickoffStr = kickoffDate.toLocaleDateString(locale,{day:'2-digit',month:'2-digit'}) + ' ' + kickoffDate.toLocaleTimeString(locale,{hour:'2-digit',minute:'2-digit'});

    let badgeHtml, badgeClass;
    if (m.resolved) {
      const labels = [t('homeWon'), t('draw'), t('awayWon')];
      const cls = ['home','draw','away'];
      badgeHtml = `<div class="match-result ${cls[m.result]}">${labels[m.result]} ✓</div>`;
      badgeClass = 'badge-finished';
    } else if (!isOpen) {
      badgeHtml = '';
      badgeClass = 'badge-finished';
    } else {
      badgeHtml = '';
      badgeClass = 'badge-upcoming';
    }

    const statusText = m.resolved ? t('badgeResolved') : (isOpen ? t('badgeUpcoming') : t('badgeClosed'));

    const hasWon = m.resolved && (
      (m.result===0 && Number(m.userHome)>0) ||
      (m.result===1 && Number(m.userDraw)>0) ||
      (m.result===2 && Number(m.userAway)>0)
    );

    const card = document.createElement('div');
    card.className = 'match-card';
    card.innerHTML = `
      <div class="match-teams">
        <div class="team-name team-home">${escHtml(m.homeTeam)}</div>
        <span class="match-vs">VS</span>
        <div class="team-name team-away">${escHtml(m.awayTeam)}</div>
      </div>
      <div class="match-meta">
        <span class="match-badge ${badgeClass}">${statusText}</span>
        <span>📅 ${kickoffStr}</span>
        ${!m.resolved ? `<span>⏱ ${matchTimeLabel(m.kickoff)}</span>` : ''}
        <span>💰 ${(Number(totalPool)/1e18).toFixed(3)} ${t('pool')}</span>
      </div>
      ${badgeHtml}
      <div class="odds-row">
        <div class="odds-btn${isOpen?'':' disabled-look'}" ${isOpen?`onclick="placeBetMatch(${m.id},0)"`:''}>
          <div class="odds-label">🏠 ${escHtml(m.homeTeam)}</div>
          <div class="odds-value">${oddsHome === '—' ? '3.00' : oddsHome}x</div>
          <div class="odds-pool">${poolHomeFmt} USDC</div>
        </div>
        <div class="odds-btn${isOpen?'':' disabled-look'}" ${isOpen?`onclick="placeBetMatch(${m.id},1)"`:''}>
          <div class="odds-label">🤝 ${t('draw')}</div>
          <div class="odds-value">${oddsDraw === '—' ? '3.50' : oddsDraw}x</div>
          <div class="odds-pool">${poolDrawFmt} USDC</div>
        </div>
        <div class="odds-btn${isOpen?'':' disabled-look'}" ${isOpen?`onclick="placeBetMatch(${m.id},2)"`:''}>
          <div class="odds-label">✈️ ${escHtml(m.awayTeam)}</div>
          <div class="odds-value">${oddsAway === '—' ? '3.00' : oddsAway}x</div>
          <div class="odds-pool">${poolAwayFmt} USDC</div>
        </div>
      </div>
      ${isOpen ? `<div class="match-bet-row"><input class="bet-input" id="wamt-${m.id}" type="number" min="0.0001" step="0.0001" placeholder="${t('amountPlaceholder')}" /></div>` : ''}
      ${Number(m.userHome)>0 ? `<div class="your-bet-info">${t('userHomeBet')} ${(Number(m.userHome)/1e18).toFixed(4)} USDC</div>` : ''}
      ${Number(m.userDraw)>0 ? `<div class="your-bet-info">${t('userDrawBet')} ${(Number(m.userDraw)/1e18).toFixed(4)} USDC</div>` : ''}
      ${Number(m.userAway)>0 ? `<div class="your-bet-info">${t('userAwayBet')} ${(Number(m.userAway)/1e18).toFixed(4)} USDC</div>` : ''}
      ${hasWon && !m.claimed ? `<button class="btn-claim" style="margin-top:0.75rem" onclick="claimMatch(${m.id})">${t('claimWin')}</button>` : ''}
      ${hasWon && m.claimed ? `<div class="your-bet-info" style="color:var(--yes);margin-top:0.5rem;">${t('claimDone')}</div>` : ''}
      <button class="btn-share" onclick="openShareMatch(${m.id})">${t('share')}</button>
    `;
    return card;
  }

  async function placeBetMatch(matchId, outcome) {
    if (!wcContract) { toast(t('connectFirst'), "error"); return; }
    const input = document.getElementById(`wamt-${matchId}`);
    const amount = parseFloat(input?.value);
    if (!amount || amount <= 0) { toast(t('validAmount'), "error"); return; }
    const labels = [t('betHome'), t('betDraw'), t('betAway')];
    try {
      toast(t('sendingTx'));
      const tx = await wcContract.placeBet(matchId, outcome, {value: parseEther(amount.toString())});
      toast(t('waitingConfirm'));
      await tx.wait();
      toast(`${labels[outcome]} ${t('matchBetPlaced')} ${amount} USDC`, "success");
      if (input) input.value = "";
      await loadMatches();
    } catch(err) { toast(t('txError') + " " + (err?.reason || err?.message || t('unknown')), "error"); }
  }

  async function claimMatch(matchId) {
    if (!wcContract) { toast(t('connectFirst'), "error"); return; }
    try {
      toast(t('claiming'));
      const tx = await wcContract.claimWinnings(matchId);
      await tx.wait();
      toast(t('claimSuccess'), "success");
      await loadMatches();
    } catch(err) { toast(t('error') + " " + (err?.reason || err?.message || t('unknown')), "error"); }
  }

  // ── LEADERBOARD ──────────────────────────────────────────────────────────────
  let leaderboardLastLoad = 0;
  async function loadLeaderboard() {
    const now = Date.now();
    if (now - leaderboardLastLoad < 60000) return;
    leaderboardLastLoad = now;
    const container = document.getElementById('leaderboardContainer');
    container.innerHTML = `<div class="empty-state"><span class="spinner"></span> ${t('loading')}</div>`;
    try {
      const res = await fetch('/api/leaderboard');
      const data = await res.json();
      if (!data.ok || !data.leaderboard?.length) {
        document.getElementById('lbStatPlayers').textContent = '0';
        document.getElementById('lbStatTopWin').textContent = '0.00 USDC';
        document.getElementById('lbStatAvgAcc').textContent = '—';
        container.innerHTML = `<div class="empty-state">${t('noLbData')}</div>`;
        return;
      }
      const lb = data.leaderboard;
      document.getElementById('lbStatPlayers').textContent = lb.length;
      document.getElementById('lbStatTopWin').textContent = lb[0].totalWinnings.toFixed(2) + ' USDC';
      const avgAcc = Math.round(lb.reduce((s,p) => s + p.accuracy, 0) / lb.length);
      document.getElementById('lbStatAvgAcc').textContent = avgAcc + '%';

      const rankIcons = ['🥇','🥈','🥉'];
      const rows = lb.map((p, i) => {
        const rankClass = i < 3 ? `top${i+1}` : '';
        const rankLabel = i < 3 ? rankIcons[i] : `#${i+1}`;
        const accClass = p.accuracy >= 60 ? 'high' : p.accuracy >= 40 ? 'mid' : 'low';
        const displayName = p.username || (p.address.slice(0,6) + '...' + p.address.slice(-4));
        return `<tr>
          <td><span class="lb-rank ${rankClass}">${rankLabel}</span></td>
          <td><span class="lb-addr" title="${p.address}">${displayName}</span></td>
          <td>${p.totalBets}</td>
          <td class="lb-winnings">${p.totalWinnings.toFixed(3)}</td>
          <td><span class="lb-accuracy ${accClass}">${p.accuracy}%</span></td>
        </tr>`;
      }).join('');

      container.innerHTML = `
        <table class="lb-table">
          <thead><tr><th>${t('lbColRank')}</th><th>${t('lbColPlayer')}</th><th>${t('lbColBets')}</th><th>${t('lbColWinnings')}</th><th>${t('lbColAccuracy')}</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>`;
    } catch (err) {
      container.innerHTML = `<div class="empty-state">${t('lbLoadError')} ${err.message}</div>`;
    }
  }

  // ── PROFILE / HISTORY ────────────────────────────────────────────────────────
  function renderProfileItems(allItems) {
    const histContainer = document.getElementById('historyContainer');
    const totalBets = allItems.length;
    const wins = allItems.filter(x => x.status === 'win').length;
    const totalIn = allItems.reduce((s, x) => s + x.userBetTotal, 0);
    const totalOut = allItems.filter(x => x.status === 'win').reduce((s, x) => s + x.winnings, 0);
    const netPnl = totalOut - totalIn;
    const resolvedBets = allItems.filter(x => x.status !== 'pending');
    const acc = resolvedBets.length > 0 ? Math.round((wins / resolvedBets.length) * 100) : 0;
    document.getElementById('profTotalBets').textContent = totalBets;
    document.getElementById('profWins').textContent = wins;
    document.getElementById('profAccuracy').textContent = acc + '%';
    const pnlEl = document.getElementById('profNetPnl');
    pnlEl.textContent = (netPnl >= 0 ? '+' : '') + netPnl.toFixed(3) + ' USDC';
    pnlEl.style.color = netPnl >= 0 ? 'var(--yes)' : 'var(--no)';
    if (!allItems.length) { histContainer.innerHTML = `<div class="empty-state">${t('noBetHistory')}</div>`; return; }
    histContainer.innerHTML = allItems.map(x => {
      const statusLabel = x.status === 'win'
        ? `<span class="result-win">${t('resultWin')} (+${x.winnings.toFixed(4)} USDC)</span>`
        : x.status === 'loss'
        ? `<span class="result-loss">${t('resultLoss')}</span>`
        : `<span class="result-pending">${t('resultPending')}</span>`;
      const typeIcon = x.type === 'match' ? '⚽' : '🔮';
      const idLabel = x.type === 'match' ? `${t('histMatch')}${x.id}` : `${t('histPred')}${x.id}`;
      return `<div class="history-item"><div><div class="history-q">${typeIcon} ${escHtml(x.q)}</div><div class="history-meta">${t('histBet')} ${x.userBetTotal.toFixed(4)} USDC | ${idLabel}</div></div><div class="history-result">${statusLabel}</div></div>`;
    }).join('');
  }

  async function loadProfile() {
    if (!userAddress) {
      document.getElementById('profileNotConnected').style.display = 'block';
      document.getElementById('profileContent').style.display = 'none';
      return;
    }
    document.getElementById('profileNotConnected').style.display = 'none';
    document.getElementById('profileContent').style.display = 'block';
    ['profTotalBets','profWins','profAccuracy','profNetPnl'].forEach(id =>
      document.getElementById(id).textContent = '...'
    );
    const histContainer = document.getElementById('historyContainer');
    histContainer.innerHTML = `<div class="empty-state"><span class="spinner"></span> ${t('loading')}</div>`;

    try {
      const res = await fetch(`/api/profile?address=${userAddress}`,
        { signal: AbortSignal.timeout(15000) });
      if (res.ok) {
        const data = await res.json();
        if (data.ok && Array.isArray(data.items)) {
          renderProfileItems(data.items.slice().reverse());
          return;
        }
      }
    } catch (_) {}

    histContainer.innerHTML = `<div class="empty-state"><span class="spinner"></span> ${t('scanning')}</div>`;
    try {
      const latest = await provider.getBlockNumber();
      const [predIds, matchIds] = await Promise.all([
        getProfileBetIds(contract, contract.filters.BetPlaced(null, userAddress), CONTRACT_ADDRESS, latest),
        wcContract ? getProfileBetIds(wcContract, wcContract.filters.BetPlaced(null, userAddress), WC_CONTRACT_ADDRESS, latest) : Promise.resolve([])
      ]);
      const totalExpected = predIds.length + matchIds.length;
      if (totalExpected > 0) {
        histContainer.innerHTML = `<div class="empty-state"><span class="spinner"></span> ${totalExpected} ${t('loadingBets')}</div>`;
      }
      const [predItems, matchItems] = await Promise.all([
        Promise.all(predIds.map(async i => {
          try {
            const [[q, deadline, resolved, result, totalYes, totalNo], [yesAmt, noAmt, claimed]] = await Promise.all([
              contract.getPrediction(i), contract.getUserBets(i, userAddress)
            ]);
            const userYes = Number(BigInt(yesAmt)), userNo = Number(BigInt(noAmt));
            if (userYes === 0 && userNo === 0) return null;
            const totalPool = Number(BigInt(totalYes)) + Number(BigInt(totalNo));
            let winnings = 0, status = 'pending';
            if (resolved) {
              const won = (result && userYes > 0) || (!result && userNo > 0);
              if (won) { const winPool = result ? Number(BigInt(totalYes)) : Number(BigInt(totalNo)); winnings = ((result ? userYes : userNo) * totalPool * 98) / (winPool * 100); status = 'win'; }
              else { status = 'loss'; }
            }
            return { type: 'pred', id: i, q: String(q), deadline: Number(deadline), resolved, result, status, userBetTotal: (userYes + userNo) / 1e18, winnings: winnings / 1e18, claimed };
          } catch { return null; }
        })),
        wcContract ? Promise.all(matchIds.map(async i => {
          try {
            const [m, ub] = await Promise.all([wcContract.getMatch(i), wcContract.getUserBet(i, userAddress)]);
            const uHome = Number(ub[0]), uDraw = Number(ub[1]), uAway = Number(ub[2]);
            if (uHome === 0 && uDraw === 0 && uAway === 0) return null;
            const resolved = m[3], result = Number(m[4]);
            const totalPool = Number(m[5]) + Number(m[6]) + Number(m[7]);
            let winnings = 0, status = 'pending';
            if (resolved) {
              const userAmt = result === 0 ? uHome : result === 1 ? uDraw : uAway;
              const winPool = result === 0 ? Number(m[5]) : result === 1 ? Number(m[6]) : Number(m[7]);
              if (userAmt > 0) { winnings = (userAmt * totalPool * 98) / (winPool * 100); status = 'win'; }
              else { status = 'loss'; }
            }
            return { type: 'match', id: i, q: `${m[0]} vs ${m[1]}`, kickoff: Number(m[2]), resolved, result, status, userBetTotal: (uHome + uDraw + uAway) / 1e18, winnings: winnings / 1e18, claimed: ub[3] };
          } catch { return null; }
        })) : Promise.resolve([])
      ]);
      renderProfileItems([...predItems, ...matchItems].filter(Boolean).reverse());
    } catch (err) {
      histContainer.innerHTML = `<div class="empty-state">${t('loadError')} ${err.message}</div>`;
    }
  }

  // ── SOCIAL SHARING ───────────────────────────────────────────────────────────
  let shareText = '';
  function openSharePred(id, yesPct) {
    const pred = allPredictions.find(p => p.id === id);
    if (!pred) return;
    const pool = ((Number(BigInt(pred.totalYes)) + Number(BigInt(pred.totalNo))) / 1e18).toFixed(2);
    if (lang === 'en') {
      shareText = `🔮 I predicted on Arc Predict!\n\n"${pred.question}"\n\n📊 YES ${yesPct}% | NO ${100 - yesPct}%\n💰 Total Pool: ${pool} USDC\n\n🔗 ${window.location.origin}\n#ArcPredict #Web3 #Prediction`;
    } else {
      shareText = `🔮 Arc Predict'te tahmin ettim!\n\n"${pred.question}"\n\n📊 EVET ${yesPct}% | HAYIR ${100 - yesPct}%\n💰 Toplam Havuz: ${pool} USDC\n\n🔗 ${window.location.origin}\n#ArcPredict #Web3 #Tahmin`;
    }
    document.getElementById('shareTextPreview').textContent = shareText;
    document.getElementById('shareModal').style.display = 'flex';
  }

  function openShareMatch(id) {
    const m = allMatches[id];
    if (!m) return;
    const pool = (Number(m.poolHome + m.poolDraw + m.poolAway) / 1e18).toFixed(2);
    if (lang === 'en') {
      const resultStr = m.resolved ? [t('homeWon'), t('draw'), t('awayWon')][m.result] + ' ✓' : 'Open for Bets';
      shareText = `⚽ I placed a match bet on Arc Predict!\n\n${m.homeTeam} vs ${m.awayTeam}\n${resultStr}\n💰 Pool: ${pool} USDC\n\n🏆 FIFA World Cup 2026 prediction platform!\n🔗 ${window.location.origin}\n#ArcPredict #FIFAWorldCup2026 #Web3`;
    } else {
      const resultStr = m.resolved ? ['Ev Sahibi Kazandı','Beraberlik','Deplasman Kazandı'][m.result] + ' ✓' : 'Bahis Açık';
      shareText = `⚽ Arc Predict'te maç tahmini yaptım!\n\n${m.homeTeam} vs ${m.awayTeam}\n${resultStr}\n💰 Havuz: ${pool} USDC\n\n🏆 FIFA Dünya Kupası 2026 bahis platformu!\n🔗 ${window.location.origin}\n#ArcPredict #FIFAWorldCup2026 #Web3`;
    }
    document.getElementById('shareTextPreview').textContent = shareText;
    document.getElementById('shareModal').style.display = 'flex';
  }

  function closeShare() { document.getElementById('shareModal').style.display = 'none'; }
  function shareTwitter() { window.open('https://twitter.com/intent/tweet?text=' + encodeURIComponent(shareText), '_blank', 'noopener'); }
  function shareFarcaster() { window.open('https://warpcast.com/~/compose?text=' + encodeURIComponent(shareText), '_blank', 'noopener'); }

  // ── Init ─────────────────────────────────────────────────────────────────────
  applyTranslations();

  window.addEventListener("load", async () => {
    if (!window.ethereum) return;
    try {
      const accounts = await window.ethereum.request({method:"eth_accounts"});
      if (accounts.length > 0) await connectWallet();
    } catch(_) {}
  });
  window.ethereum?.on("accountsChanged", () => location.reload());
  window.ethereum?.on("chainChanged", () => location.reload());
</script>
